version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: safequest-db
    environment:
      POSTGRES_USER: safequest_admin
      POSTGRES_PASSWORD: safequest_secure_pass
      POSTGRES_DB: safequest_main
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: safequest-redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: safequest-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://safequest_admin:safequest_secure_pass@db:5432/safequest_main
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:8000
      ENCRYPTION_KEY: your_super_secret_32_char_key_here!!
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/uploads:/app/uploads

  ai-service:
    build: ./ai-service
    container_name: safequest-ai
    ports:
      - "8000:8000"
    environment:
      - PORT=8000


volumes:
  postgres_data:
